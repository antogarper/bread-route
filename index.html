
<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:Inter,sans-serif; background:#0f1117; color:#e8eaf0; }
    #map  { width:100%; height:450px; }
    #info { padding:12px 16px; font-size:12px; background:#181c27; border-top:1px solid #242938; }
    .leg  { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #242938; }
    .leg:last-child { border-bottom:none; }
    .dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .total { font-weight:700; color:#f5a623; margin-bottom:8px; }
  </style>
</head>
<body>
<div id="map"></div>
<div id="info">🗺️ Calculating route…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const route  = [{"name": "Diar Al-Andalus", "address": "Pol. Ind. La L\u00e9ala, C. Concordia, 9, 29631 Benalm\u00e1dena, M\u00e1laga", "lat": 36.606469, "lng": -4.5299381}, {"name": "Telepollo M\u00e1laga", "address": "Av. Imperio Argentina, 12, Carretera de C\u00e1diz, 29004 M\u00e1laga", "lat": 36.6822735, "lng": -4.4542488}, {"name": "Asador de pollos Nora", "address": "Av. de Carlos Haya, 63, Cruz de Humilladero, 29010 M\u00e1laga", "lat": 36.7221966, "lng": -4.4480683}, {"name": "DLuch Estebanez Calderon", "address": "C. Est\u00e9banez Calder\u00f3n, 16, Distrito Centro, 29007 M\u00e1laga", "lat": 36.7210565, "lng": -4.4308588}, {"name": "El Delantal take away", "address": "C. Refino, 1, Centro, Distrito Centro, 29013 M\u00e1laga", "lat": 36.7257194, "lng": -4.4188876}, {"name": "Isla Market", "address": "C. Frailes, 36, Distrito Centro, 29012 M\u00e1laga", "lat": 36.7255869, "lng": -4.4185702}];
const COLORS = ["hsl(0, 80%, 55%)", "hsl(72, 80%, 55%)", "hsl(144, 80%, 55%)", "hsl(216, 80%, 55%)", "hsl(288, 80%, 55%)"];

const map = L.map("map").setView([route[0].lat, route[0].lng], 11);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

setTimeout(() => map.invalidateSize(), 300);

function makeIcon(label, isDepot) {
  const size = isDepot ? 36 : 30;
  const bg   = isDepot ? "#f5a623" : "#1e293b";
  return L.divIcon({
    className: "",
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:3px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,0.5)">${label}</div>`,
    iconSize:    [size, size],
    iconAnchor:  [size/2, size/2],
    popupAnchor: [0, -size/2],
  });
}

route.forEach((stop, i) => {
  const isDepot = i === 0;
  L.marker([stop.lat, stop.lng], { icon: makeIcon(isDepot ? "🏭" : i, isDepot) })
    .addTo(map)
    .bindPopup(`<b>${stop.name}</b><br><small>${stop.address || ""}</small>`);
});

async function drawLegs() {
  const allLatLngs = [];
  let totalDist = 0, totalDur = 0;
  const legSummary = [];

  for (let i = 0; i < route.length - 1; i++) {
    const a = route[i], b = route[i+1];
    const res  = await fetch(`https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`);
    const data = await res.json();
    const latlngs = data.routes[0].geometry.coordinates.map(([lng,lat]) => [lat,lng]);
    const km  = (data.routes[0].distance / 1000).toFixed(1);
    const min = Math.round(data.routes[0].duration / 60);
    const color = COLORS[i];

    L.polyline(latlngs, { color:"#fff", weight:8, opacity:0.5 }).addTo(map);
    L.polyline(latlngs, { color, weight:5, opacity:1 }).addTo(map);

    allLatLngs.push(...latlngs);
    totalDist += parseFloat(km);
    totalDur  += min;

    legSummary.push(`
      <div class="leg">
        <span class="dot" style="background:${color}"></span>
        <div>
          <div style="font-weight:600;color:#e8eaf0">→ ${b.name}</div>
          <div style="color:#6b7280;font-size:11px">${km} km · ~${min} min</div>
        </div>
      </div>`);
  }

  map.fitBounds(L.polyline(allLatLngs).getBounds(), { padding:[40,40] });
  setTimeout(() => map.invalidateSize(), 300);

  document.getElementById("info").innerHTML =
    `<div class="total">🍞 Total: ${totalDist.toFixed(1)} km · ${totalDur} min</div>` +
    legSummary.join("");
}

drawLegs();
</script>
</body>
</html>
