
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:Inter,system-ui,sans-serif; background:#0f1117; color:#e8eaf0; }

    #header {
      padding:10px 14px;
      background:#181c27;
      border-bottom:1px solid #242938;
      display:flex;
      align-items:center;
      gap:10px;
    }
    #header-title { font-size:14px; font-weight:700; }
    #header-sub   { font-size:10px; color:#6b7280; }
    #total-badge  {
      margin-left:auto;
      background:#7a5112;
      color:#f5a623;
      font-weight:700;
      font-size:12px;
      padding:4px 10px;
      border-radius:20px;
      white-space:nowrap;
    }

    #map {
      width:100%;
      height:50vh;
    }

    #info {
      padding:12px 14px;
      background:#181c27;
      border-top:1px solid #242938;
      overflow-y:auto;
      height:calc(50vh - 52px);  /* fill remaining screen below map */
    }

    .leg {
      display:flex;
      align-items:center;
      gap:10px;
      padding:8px 0;
      border-bottom:1px solid #1e2336;
    }
    .leg:last-child { border-bottom:none; }
    .dot {
      width:12px; height:12px;
      border-radius:50%;
      flex-shrink:0;
    }
    .leg-name  { font-size:13px; font-weight:600; color:#e8eaf0; }
    .leg-stats { font-size:11px; color:#6b7280; margin-top:2px; }
    .total-row {
      font-weight:700;
      color:#f5a623;
      font-size:13px;
      margin-bottom:10px;
      padding-bottom:8px;
      border-bottom:1px solid #242938;
    }
  </style>
</head>
<body>

<div id="header">
  <span style="font-size:20px">🍞</span>
  <div>
    <div id="header-title">Bread Route</div>
    <div id="header-sub">Optimized delivery · OpenStreetMap</div>
  </div>
  <div id="total-badge">Calculating…</div>
</div>

<div id="info">🗺️ Loading route…</div>
<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const route  = [{"name": "Diar Al-Andalus", "address": "Pol. Ind. La L\u00e9ala, C. Concordia, 9, 29631 Benalm\u00e1dena, M\u00e1laga", "lat": 36.606469, "lng": -4.5299381}, {"name": "Telepollo M\u00e1laga", "address": "Av. Imperio Argentina, 12, Carretera de C\u00e1diz, 29004 M\u00e1laga", "lat": 36.6822735, "lng": -4.4542488}, {"name": "Asador de pollos Nora", "address": "Av. de Carlos Haya, 63, Cruz de Humilladero, 29010 M\u00e1laga", "lat": 36.7221966, "lng": -4.4480683}, {"name": "DLuch Estebanez Calderon", "address": "C. Est\u00e9banez Calder\u00f3n, 16, Distrito Centro, 29007 M\u00e1laga", "lat": 36.7210565, "lng": -4.4308588}, {"name": "El Delantal take away", "address": "C. Refino, 1, Centro, Distrito Centro, 29013 M\u00e1laga", "lat": 36.7257194, "lng": -4.4188876}, {"name": "Isla Market", "address": "C. Frailes, 36, Distrito Centro, 29012 M\u00e1laga", "lat": 36.7255869, "lng": -4.4185702}];
const COLORS = ["hsl(0, 80%, 55%)", "hsl(72, 80%, 55%)", "hsl(144, 80%, 55%)", "hsl(216, 80%, 55%)", "hsl(288, 80%, 55%)"];

const map = L.map("map").setView([route[0].lat, route[0].lng], 11);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map);

setTimeout(() => map.invalidateSize(), 300);

function makeIcon(label, isDepot) {
  const size = isDepot ? 34 : 28;
  const bg   = isDepot ? "#f5a623" : "#1e293b";
  return L.divIcon({
    className: "",
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${bg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.5)">${label}</div>`,
    iconSize:    [size, size],
    iconAnchor:  [size/2, size/2],
    popupAnchor: [0, -size/2],
  });
}

route.forEach((stop, i) => {
  const isDepot = i === 0;
  L.marker([stop.lat, stop.lng], { icon: makeIcon(isDepot ? "🏭" : i, isDepot) })
    .addTo(map)
    .bindPopup(`<b>${stop.name}</b><br><small>${stop.address || ""}</small>`);
});

async function drawLegs() {
  const allLatLngs = [];
  let totalDist = 0, totalDur = 0;
  const legSummary = [];

  for (let i = 0; i < route.length - 1; i++) {
    const a = route[i], b = route[i+1];
    const res  = await fetch(`https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson`);
    const data = await res.json();
    const latlngs = data.routes[0].geometry.coordinates.map(([lng,lat]) => [lat,lng]);
    const km  = (data.routes[0].distance / 1000).toFixed(1);
    const min = Math.round(data.routes[0].duration / 60);
    const color = COLORS[i];

    L.polyline(latlngs, { color:"#fff", weight:6, opacity:0.4 }).addTo(map);
    L.polyline(latlngs, { color, weight:4, opacity:1 }).addTo(map);

    allLatLngs.push(...latlngs);
    totalDist += parseFloat(km);
    totalDur  += min;

    legSummary.push(`
      <div class="leg">
        <span class="dot" style="background:${color}"></span>
        <div>
          <div class="leg-name">→ ${b.name}</div>
          <div class="leg-stats">${km} km · ~${min} min</div>
        </div>
      </div>`);
  }

  map.fitBounds(L.polyline(allLatLngs).getBounds(), { padding:[30,30] });
  setTimeout(() => map.invalidateSize(), 300);

  document.getElementById("total-badge").textContent =
    totalDist.toFixed(1) + " km · " + totalDur + " min";

  document.getElementById("info").innerHTML =
    `<div class="total-row">🍞 Total: ${totalDist.toFixed(1)} km · ${totalDur} min · ${route.length - 1} stops</div>` +
    legSummary.join("");
}

drawLegs();
</script>
</body>
</html>
